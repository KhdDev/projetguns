<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamss</title>
    <link rel="icon" type="image/gif" href="https://i.pinimg.com/originals/e3/22/95/e322954c177d477ed505d2c6a31ee69d.gif">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Background image (blurred on intro) -->
    <div class="bg-image" id="bgImage"></div>

    <!-- Particles background -->
    <canvas id="particles"></canvas>

    <!-- Intro screen -->
    <div id="intro" class="intro">
        <p class="intro-text" id="enterBtn">click here.</p>
    </div>

    <!-- Main profile -->
    <div id="profile" class="profile hidden">
        <div class="profile-card">
            <div class="avatar-wrapper">
                <img id="avatar" class="avatar" src="" alt="Avatar">
                <span class="status-dot" id="statusDot"></span>
            </div>
            <h1 class="username" id="username"></h1>
            <p class="bio" id="bio"></p>

            <!-- Discord + GitHub side by side -->
            <div class="cards-row">
                <div class="card-group">
                    <a href="https://discord.com/users/1255967804889501889" target="_blank" class="link-btn discord-btn">
                        <i class="fa-brands fa-discord"></i> Discord
                    </a>
                    <div class="card discord-card" id="discordCard">
                        <div class="discord-banner" id="discordBanner"></div>
                        <div class="discord-profile">
                            <div class="discord-avatar-wrapper">
                                <img id="discordAvatar" class="discord-avatar" src="" alt="">
                                <span class="discord-status-dot" id="discordStatusDot"></span>
                            </div>
                            <div class="discord-badges-row" id="discordBadges"></div>
                        </div>
                        <div class="discord-details">
                            <p class="discord-name" id="discordName">Chargement...</p>
                            <p class="discord-tag" id="discordTag" title="Clic pour copier"></p>
                            <div class="discord-separator"></div>
                            <div class="discord-section">
                                <p class="discord-section-title">A PROPOS</p>
                                <p class="discord-bio-text">ripro</p>
                            </div>
                            <div class="discord-section">
                                <p class="discord-section-title">MEMBRE DISCORD DEPUIS</p>
                                <p class="discord-member-since"><i class="fa-brands fa-discord" style="color:#5865f2"></i> 27 juin 2024</p>
                            </div>
                            <div class="discord-activity" id="discordActivity"></div>
                        </div>
                    </div>
                </div>

                <div class="card-group">
                    <a href="https://github.com/KhdDev" target="_blank" class="link-btn github-btn">
                        <i class="fa-brands fa-github"></i> GitHub
                    </a>
                    <div class="card github-card" id="githubCard">
                        <div class="github-banner"></div>
                        <div class="github-profile">
                            <div class="github-avatar-wrapper">
                                <img id="githubAvatar" class="github-avatar" src="" alt="">
                            </div>
                        </div>
                        <div class="github-details">
                            <p class="github-name" id="githubName">Chargement...</p>
                            <p class="github-tag" id="githubTag"></p>
                            <div class="github-separator"></div>
                            <div class="github-section">
                                <p class="github-section-title">BIO</p>
                                <p class="github-bio" id="githubBio"></p>
                            </div>
                            <div class="github-section">
                                <p class="github-section-title">LOCALISATION</p>
                                <p class="github-location" id="githubLocation"><i class="fa-solid fa-location-dot"></i></p>
                            </div>
                            <div class="github-separator"></div>
                            <div class="github-stats" id="githubStats"></div>
                            <div class="github-section">
                                <p class="github-section-title">MEMBRE DEPUIS</p>
                                <p class="github-member-since" id="githubSince"><i class="fa-brands fa-github" style="color:#fff"></i></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Steam -->
            <div class="card steam-card" id="steamCard">
                <div class="steam-banner"></div>
                <div class="steam-profile">
                    <div class="steam-avatar-wrapper">
                        <img id="steamAvatar" class="steam-avatar" src="" alt="">
                        <span class="steam-status-dot" id="steamStatusDot"></span>
                    </div>
                </div>
                <div class="steam-details">
                    <p class="steam-name" id="steamName">Chargement...</p>
                    <p class="steam-tag" id="steamTag"></p>
                    <div class="steam-separator"></div>
                    <div class="steam-section">
                        <p class="steam-section-title">STATUT</p>
                        <p class="steam-status" id="steamStatus"></p>
                    </div>
                    <div class="steam-section" id="steamGameSection" style="display:none">
                        <p class="steam-section-title">EN JEU</p>
                        <div class="currently-playing" id="currentlyPlaying"></div>
                    </div>
                    <div class="steam-separator"></div>
                    <div class="steam-section">
                        <p class="steam-section-title">MEMBRE DEPUIS</p>
                        <p class="steam-member-since" id="steamSince"><i class="fa-brands fa-steam" style="color:#66c0f4"></i></p>
                    </div>
                </div>
            </div>
            <a href="https://steamcommunity.com/profiles/76561198816671133/" target="_blank" class="link-btn steam-btn">
                <i class="fa-brands fa-steam"></i> Steam
            </a>
        </div>
    </div>

    <!-- Audio player -->
    <audio id="bgMusic" loop preload="auto">
        <source src="Comme dhabitude.mp3" type="audio/mpeg">
    </audio>

    <!-- Music control (subtle bottom-right) -->
    <div class="music-control hidden" id="musicControl">
        <button class="music-nav-btn" id="rewindBtn" title="Reculer">
            <i class="fa-solid fa-backward"></i>
        </button>
        <button class="music-btn" id="musicBtn" title="Play/Pause">
            <i class="fa-solid fa-play" id="playIcon"></i>
            <i class="fa-solid fa-pause" id="pauseIcon" style="display:none"></i>
        </button>
        <button class="music-nav-btn" id="forwardBtn" title="Avancer">
            <i class="fa-solid fa-forward"></i>
        </button>
        <div class="music-progress" id="musicProgress">
            <div class="music-progress-bar" id="musicProgressBar"></div>
        </div>
    </div>

    <!-- View counter -->
    <div class="view-counter hidden" id="viewCounter">
        <i class="fa-solid fa-eye"></i>
        <span id="viewCount">0</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
